<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#DC2626" />
    <title>غير متصل | نواقص</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Tahoma', sans-serif;
        background: linear-gradient(135deg, #DC2626 0%, #1e0c0c 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .container {
        max-width: 500px;
        width: 100%;
      }
      .logo {
        width: 120px;
        height: 120px;
        margin: 0 auto 1.5rem;
        background: #fff;
        border-radius: 30%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: #DC2626;
        font-weight: bold;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      }
      h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
        font-weight: 700;
      }
      p {
        font-size: 1.1rem;
        line-height: 1.7;
        opacity: 0.9;
        margin-bottom: 1.5rem;
      }
      .retry-btn {
        background: #fff;
        color: #DC2626;
        border: none;
        padding: 0.9rem 2.5rem;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      }
      .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
      .retry-btn:active { transform: translateY(0); }
      .hint {
        margin-top: 2rem;
        font-size: 0.9rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">ن</div>
      <h1>أنت غير متصل بالإنترنت</h1>
      <p>يبدو أن الاتصال بالإنترنت غير متاح حالياً. تحقق من اتصالك وحاول مرة أخرى.</p>
      <button class="retry-btn" onclick="location.reload()">إعادة المحاولة</button>
      <p class="hint">سيتم تحميل التطبيق تلقائياً عند عودة الاتصال</p>
    </div>
    <script>
      // Auto-retry when connection is restored
      window.addEventListener('online', () => location.reload());
      // Auto-retry every 10 seconds
      setInterval(() => {
        if (navigator.onLine) location.reload();
      }, 10000);
    </script>
  </body>
</html>

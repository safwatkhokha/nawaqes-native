name: Build Nawaqes APK

# ════════════════════════════════════════════════════════════════════
#  Build Nawaqes Android APK v1.3.1 (unified app)
#  ───────────────────────────────────────────────────────────────────
#  Triggers:
#    - Push to main (only when apk-source-main/ or this workflow changes)
#    - Manual dispatch (with optional upload to HF Dataset)
#
#  Outputs:
#    - app-release.apk as a GitHub Actions artifact (downloadable for 90 days)
#    - Optional: uploads to HF Dataset safwatkhokha/nawaqes-backup
#               as nawaqes-v1.3.1.apk (if HF_TOKEN secret is set)
# ════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
    paths:
      - 'apk-source-main/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      upload_to_hf:
        description: 'Upload APK to HuggingFace Dataset after build'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 🤖 Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      - name: 📦 Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apk-source-main/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('apk-source-main/**/*.gradle*', 'apk-source-main/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔑 Verify keystore exists
        run: |
          if [ ! -f apk-source-main/nawaqes-release.keystore ]; then
            echo "::error::Keystore file not found at apk-source-main/nawaqes-release.keystore"
            echo "::error::Add it as a GitHub Secret (KEYS_BASE64) or commit it to the repo"
            exit 1
          fi
          ls -la apk-source-main/nawaqes-release.keystore

      - name: 🔨 Build release APK
        working-directory: apk-source-main
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 📝 Show build output
        run: |
          echo "=== Build artifacts ==="
          find apk-source-main/app/build/outputs/apk -name "*.apk" -exec ls -la {} \;

      - name: 📦 Rename APK
        run: |
          mkdir -p artifacts
          cp apk-source-main/app/build/outputs/apk/release/app-release.apk \
             artifacts/nawaqes-v1.3.1.apk
          ls -la artifacts/

      - name: 📤 Upload APK as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: nawaqes-v1.3.1-apk
          path: artifacts/nawaqes-v1.3.1.apk
          retention-days: 90
          if-no-files-found: error

      - name: 🚀 Upload to HuggingFace Dataset (optional)
        if: ${{ github.event.inputs.upload_to_hf == 'true' || github.event_name == 'push' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN secret not set — skipping HF upload"
            echo "::warning::The APK is still available as a GitHub Actions artifact (downloadable for 90 days)"
            exit 0
          fi

          echo "Installing huggingface_hub..."
          pip install -q huggingface_hub

          echo "Uploading nawaqes-v1.3.1.apk to safwatkhokha/nawaqes-backup..."
          python3 << 'PYEOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ['HF_TOKEN'])
          api.upload_file(
              path_or_fileobj='artifacts/nawaqes-v1.3.1.apk',
              path_in_repo='nawaqes-v1.3.1.apk',
              repo_id='safwatkhokha/nawaqes-backup',
              repo_type='dataset'
          )
          print('✓ Uploaded to https://huggingface.co/datasets/safwatkhokha/nawaqes-backup/resolve/main/nawaqes-v1.3.1.apk')
          PYEOF

      - name: ✅ Summary
        if: always()
        run: |
          echo "## 📱 APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.3.1 (versionCode 15) |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.nawaqes.app |" >> $GITHUB_STEP_SUMMARY
          echo "| Min Android | 5.0 (API 21) |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Android | 13 (API 33) |" >> $GITHUB_STEP_SUMMARY
          echo "| FCM Native | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "- **GitHub Artifact**: Available in the Actions tab (90 days)" >> $GITHUB_STEP_SUMMARY
          echo "- **HF Dataset**: https://huggingface.co/datasets/safwatkhokha/nawaqes-backup/resolve/main/nawaqes-v1.3.1.apk" >> $GITHUB_STEP_SUMMARY

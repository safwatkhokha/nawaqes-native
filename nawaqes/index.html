    <!-- 🔧 CRITICAL: Force-unregister ALL Service Workers BEFORE any other script -->
    <!-- This prevents white screen from stale SW cache -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          // Register OUR service worker (for FCM background push notifications).
          // This SW handles 'push' and 'notificationclick' events so notifications
          // arrive even when the app is closed or in background.
          // Previously this block UNREGISTERED all SWs (legacy caching cleanup),
          // which broke background push notifications entirely.
          navigator.serviceWorker.register('/sw.js', { scope: '/' }).then(function(reg) {
            console.log('[SW] Registered:', reg.scope);
          }).catch(function(err) {
            console.warn('[SW] Registration failed:', err);
          });
        }
        // Clear old caches (legacy from previous SW versions)
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }
      })();
    </script>

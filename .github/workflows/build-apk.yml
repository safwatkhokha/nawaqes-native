name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nawaqes-native
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        run: npm install -g expo-cli eas-cli

      - name: Build APK locally
        run: npx eas-cli build --platform android --profile preview --non-interactive --local --output=app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_TELEMETRY: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nawaqes-native-apk
          path: nawaqes-native/app-release.apk
          retention-days: 90
